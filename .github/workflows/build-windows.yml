name: Build Windows

# Gera o executável do Windows (EstatLab.exe) num runner Windows do GitHub.
# Roda a cada release publicado ou manualmente (aba Actions → Run workflow).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  executavel-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Rodar testes antes do build
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

      - name: Gerar executável
        run: >
          pyinstaller --name EstatLab --windowed --noconfirm
          --exclude-module tkinter app/main.py

      - name: Compactar
        run: Compress-Archive -Path dist/EstatLab -DestinationPath EstatLab-Windows.zip

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: EstatLab-Windows
          path: EstatLab-Windows.zip
          retention-days: 90
